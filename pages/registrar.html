<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="../styles/registrar.css">
</head>

<body>
    <!-- Barra superior pegada arriba -->
    <header class="top-bar"></header>

    <!-- Contenido del formulario directo en el body -->
    <section class="titulos">
        <h1>CREAR CUENTA</h1>
        <h2>REGISTRATE PARA CONTINUAR</h2>

        <form>
            <div class="usuario">
                <label for="usuario">Usuario</label>
                <input type="text" id="InputUsuario" name="usuario">
            </div>

        <div class="correo">
            <label for="correo">Correo</label>
            <input type="email" id="InputCorreo" name="correo">
        </div>
        
        <div class="contrasena">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="InputContrasena" name="contrasena">
        </div>

            <button type="submit" id="btnRegistrar" class="btnRegistrar">Registrar</button>
            
        </form>
    </section>

    <!-- Botón inferior derecho para regresar -->
    
    <a href="./inicio.html  " class="btn-regresar">Regresar</a>
</body>
    <script type="module" src="../js/registrarfire.js"></script>
</html>
